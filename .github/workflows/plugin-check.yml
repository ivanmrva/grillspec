name: plugin-source-check

# Guards the PLUGIN SOURCE (this repo) on every push/PR — not any project that uses the plugin.
# Runs the same checks RELEASING.md mandates before a release, so plugin-source drift fails here
# instead of relying on someone remembering to run selfcheck.

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: selfcheck — source integrity + ID-prefix drift + dependency-graph
        run: python3 plugin/tools/selfcheck.py plugin

      - name: dependency graph — valid + docs/DEPENDENCY-GRAPH.md in sync
        run: python3 plugin/tools/gen_depgraph.py --check

      - name: spec-tools regression suite — every lint_spec/check_contracts check still fires
        run: |
          pip install --quiet pyyaml
          python3 plugin/tools/test_lint_spec.py

      - name: task-record regression suite — every accountability check still fires
        run: python3 plugin/tools/test_check_task_record.py

      - name: no-fakes regression suite — the production-tree tripwire still fires
        run: python3 plugin/tools/test_check_no_fakes.py

      - name: config-drift regression suite — code-vs-declared env reconciliation still fires
        run: python3 plugin/tools/test_check_config_drift.py

      - name: e2e gate-chain — the three accountability gates compose on a realistic project
        run: python3 plugin/tools/test_e2e_gates.py

      - name: build — all distribution artifacts compile
        run: python3 build/build.py
